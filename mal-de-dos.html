        <h1>Mal de dos : relâcher, soutenir et alléger le quotidien</h1>
        <p class="hero-sub">
          Le mal de dos peut être lié à des postures répétées, à une tension musculaire, à un effort ou à un manque de mouvement, et la chaleur douce ainsi que certains exercices simples sont souvent utilisés pour soulager l’inconfort.[web:50][web:52][web:55]
        </p>

  <main>
    <section>
      <h2>Pourquoi le dos se crispe-t-il si facilement ?</h2>
      <p>
        Le dos supporte une grande partie des charges du quotidien : position assise prolongée, port de charges, stress, manque d’activité ou gestes répétitifs peuvent favoriser les douleurs et les tensions.[web:52][web:58]
      </p>
      <p>
        Quand l’inconfort apparaît, l’objectif n’est pas toujours de “corriger” brutalement, mais souvent de redonner au corps un peu de mobilité, de soutien et de récupération.[web:50][web:53]
      </p>
    </section>

    <section>
      <h2>Les gestes doux qui aident le plus</h2>
      <u
      <ul>
        >Appliquer de la chaleur douce sur les zones contractées pour favoriser le relâchement musculaire.[web:50][web:56]</li>
        >Revoir la posture au bureau ou à la maison pour limiter les tensions répétées.[web:52][web:55]</li>
        >Alterner les périodes assises et les petits moments de mouvement dans la journée.[web:52][web:58]</li>
      </ul>
      <p>
        Dans beaucoup de cas, un soutien ergonomique simple peut aussi aider à mieux répartir les pressions au niveau lombaire et à diminuer la sensation d’écrasement en position assise.[web:51][web:54][web:57]
      </p>
    </section>
