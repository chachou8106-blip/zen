<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Le Grimoire - Zen Chez Toi</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <style>
        :root {
            --bg-sable: #f5f2ec; --blanc: #ffffff; --brun-sombre: #2b2622; --or-zen: #a67b51;
            --maison: #6a7f8f; --jardin: #7b9074; --corps: #cca8a0; --bienetre: #d4a259; --eso: #826a8f;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Georgia', serif; background-color: var(--bg-sable); color: var(--brun-sombre); line-height: 1.6; overflow-x: hidden; }

        header { position: absolute; top: 0; width: 100%; padding: 25px 0; z-index: 1000; }
        .nav-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 50px; }
        .logo img { max-height: 90px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
        nav ul { list-style: none; display: flex; gap: 30px; align-items: center; }
        nav a { text-decoration: none; color: #ffffff; font-variant: small-caps; font-size: 1.1em; text-shadow: 0 2px 5px rgba(0,0,0,0.6); }

        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('assets/hero-accueil.jpg') center/cover no-repeat;
            display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: #ffffff;
        }
        .hero h1 { font-size: 4.5em; font-weight: normal; letter-spacing: 2px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .hero p { font-size: 1.6em; font-style: italic; margin-top: 15px; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }

        .search-area { background: var(--blanc); padding: 80px 20px; text-align: center; }
        .search-container { max-width: 700px; margin: 0 auto; position: relative; }
        .search-container input { width: 100%; padding: 20px 35px; border: 2px solid var(--bg-sable); border-radius: 50px; font-size: 1.1em; outline: none; }
        .search-container button { position: absolute; right: 10px; top: 10px; padding: 10px 25px; border-radius: 40px; border: none; background: var(--or-zen); color: white; cursor: pointer; }

        .section-separator { text-align: center; margin: 60px 0; }
        .section-separator img { height: 40px; opacity: 0.6; }

        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px 80px; }
        .chapitre { background: var(--blanc); padding: 40px; border-radius: 8px; margin-bottom: 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .chapitre h2 { text-align: center; font-size: 2.2em; margin-bottom: 30px; font-weight: normal; font-variant: small-caps; border-bottom: 1px solid var(--bg-sable); padding-bottom: 15px; color: var(--or-zen); }
        .index-grid { column-count: 3; column-gap: 40px; list-style: none; }
        .index-grid li { margin-bottom: 12px; break-inside: avoid-column; position: relative; padding-left: 20px; }
        .index-grid li::before { content: "◈"; position: absolute; left: 0; color: var(--or-zen); font-size: 0.8em; }
        .index-grid a { text-decoration: none; color: var(--brun-sombre); transition: 0.2s; }

        .pricing-section { background-color: var(--blanc); padding: 80px 20px; text-align: center; border-top: 1px solid #eee; }
        .vol-btn { padding: 12px 20px; border: 2px solid; border-radius: 50px; text-decoration: none; font-variant: small-caps; font-weight: bold; }
        .amount { font-size: 2.2em; color: var(--or-zen); font-weight: bold; }

        footer { background: var(--brun-sombre); color: #fff; padding: 40px 20px; text-align: center; border-top: 1px solid rgba(166, 123, 81, 0.2); }
        .footer-main { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: center; gap: 40px; }
        .footer-logo-small { height: 40px; }
        .footer-nav-compact { display: flex; gap: 20px; list-style: none; padding: 0; }
        .footer-nav-compact a { color: #fff; text-decoration: none; font-size: 0.85em; opacity: 0.7; font-variant: small-caps; }
    </style>
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo"><img src="assets/logo.png" alt="Zen Chez Toi"></a>
            <nav><ul><li><a href="index.html">Accueil</a></li><li><a href="blog.html">Journal</a></li><li><a href="encyclopedie.html">Encyclopédie</a></li><li><a href="livre-or.html">Livre d'Or</a></li></ul></nav>
        </div>
    </header>
    <main>
        <section class="hero">
            <h1>Le Grimoire</h1>
            <p>"L'index sacré de tes solutions naturelles."</p>
        </section>
        <section class="search-area">
            <div class="search-container">
                <form action="recherche.html" method="GET">
                    <input type="text" name="q" placeholder="Sommeil, Calcaire, Pucerons...">
                    <button type="submit">Chercher</button>
                </form>
            </div>
        </section>
        <div class="section-separator"><img src="assets/logo.png" alt="Zen"></div>
        <div class="container">
            <section class="chapitre">
                <h2>L'Herbier</h2>
                <ul class="index-grid">
                    <li><a href="acide-citrique.html">Acide Citrique</a></li>
                    </ul>
            </section>
            <div class="section-separator"><img src="assets/logo.png" alt="Zen"></div>
            <section class="chapitre">
                <h2>L'Apothicaire</h2>
                <ul class="index-grid">
                    </ul>
            </section>
            <div class="section-separator"><img src="assets/logo.png" alt="Zen"></div>
            <section class="chapitre">
                <h2>Le Placard à Soucis</h2>
                <ul class="index-grid">
                    </ul>
            </section>
        </div>
    </main>
    <footer>
        <div class="footer-main">
            <a href="index.html"><img src="assets/logo.png" class="footer-logo-small"></a>
            <ul class="footer-nav-compact">
                <li><a href="mentions-legales.html">Mentions</a></li>
                <li><a href="confidentialite.html">Confidentialité</a></li>
                <li><a href="cookies.html">Cookies</a></li>
                <li><a href="livre-or.html">Livre d'Or</a></li>
            </ul>
        </div>
        <p style="font-size: 0.75em; opacity: 0.5; margin-top: 15px;">&copy; 2026 Zen Chez Toi - Transmettre pour Libérer</p>
    </footer>
</body>
</html>
