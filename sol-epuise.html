    <h1>Sol épuisé : redonner de la vie à la terre</h1>
    <p class="hero-sub">
      Terre dure comme du béton l’été, collante l’hiver, plantes qui végètent… Parfois, le jardin ne manque pas d’amour, il manque surtout d’humus. Bonne nouvelle : un sol fatigué peut se régénérer pas à pas.[web:248][web:252][web:257]
    </p>
  </header>

  <main>
    <section>
      <h2>Reconnaître un sol fatigué</h2>
      <p>
        Les retours d’expérience et les fiches de jardinage décrivent un sol épuisé comme une terre pauvre en humus, compacte ou très légère, où les plantes poussent mal malgré les arrosages.[web:248][web:252][web:254]
      </p>
      <p>
        On observe souvent peu de vers de terre, peu de vie visible, une terre qui se croûte en surface, et des cultures qui demandent beaucoup d’efforts pour peu de résultats.[web:248][web:249][web:251]
      </p>

      <div class="box">
        <div class="box-title">Signes typiques d’un sol épuisé</div>
        <u
        <ul>
          >Terre qui se tasse, se fissure ou forme une croûte après la pluie.[web:248][web:254]</li>
          >Peu de vers de terre ou de petits insectes quand on retourne légèrement le sol.[web:248][web:255]</li>
          >Plantes chétives, feuilles pâles, arrosages fréquents sans vraie amélioration.[web:248][web:252][web:254]</li>
        </ul>
      </div>
    </section>

    <section>
      <h2>Geste clé : nourrir le sol, pas seulement les plantes</h2>
      <p>
        Les experts du sol rappellent que la priorité, ce n’est pas d’ajouter des engrais solubles, mais d’augmenter la matière organique pour nourrir la vie du sol.[web:248][web:252][web:257]
      </p>

      <h3>Compost & fumier bien décomposé</h3>
      <p>
        Des conseils pratiques recommandent d’apporter chaque année une bonne couche de compost ou de fumier mûr, laissée en surface ou légèrement incorporée, pour reconstruire la couche humique.[web:248][web:252][web:254][web:257]
      </p>

      <div class="box">
        <div class="box-title">Exemples d’apports mentionnés</div>
        <u
        <ul>
          >Quelques centimètres de compost de déchets verts à l’automne et/ou au printemps.[web:248][web:252][web:254]</li>
          >Apport régulier de fumier bien décomposé ou de vermicompost, en quantité adaptée au type de sol.[web:248][web:252][web:255]</li>
          >Ne pas enfouir profondément les matières très carbonées, mais les laisser plutôt en surface pour éviter les famines d’azote.[web:248][web:252]
        </ul>
      </div>
    </section>

    <section>
      <h2>Engrais verts : des plantes pour soigner la terre</h2>
      <p>
        Les engrais verts sont largement cités comme une solution naturelle pour améliorer structure et fertilité : on les sème, puis on les fauche pour qu’ils nourrissent le sol.[web:248][web:250][web:253][web:256][web:257]
      </p>

      <h3>Quels engrais verts choisir ?</h3>
      <p>
        Des sources recommandent par exemple la phacélie, les trèfles, la moutarde, le seigle, la vesce ou la féverole, selon le type de sol et la saison.[web:250][web:253][web:256]
      </p>

      <h3>Ce que ça apporte</h3>
      <p>
        Les engrais verts couvrent le sol, limitent l’érosion, nourrissent la vie du sol en se décomposant, et certaines légumineuses fixent même l’azote de l’air dans leurs racines.[web:248][web:250][web:253][web:254][web:256][web:257]
      </p>
    </section>

    <section>
      <h2>Paillage : protéger et nourrir en continu</h2>
      <p>
        Pailler la surface est présenté comme un geste central : le paillage protège la terre, garde l’humidité, limite les adventices et se transforme progressivement en humus.[web:248][web:249][web:251][web:254][web:257]
      </p>

      <h3>Matériaux de paillage possibles</h3>
      <p>
        Les fiches pratiques citent la paille, le foin, les tontes de gazon séchées, les feuilles mortes, les broyats de branches (BRF) et même le carton brun sans encre comme solutions de paillage accessibles.[web:249][web:251][web:254][web:257]
      </p>

      <div class="box">
        <div class="box-title">Petit pas possible</div>
        <p>
          Même si tu ne peux pas tout couvrir d’un coup, pailler les zones les plus cultivées (potager, massifs) est déjà un énorme cadeau pour ton sol.[web:248][web:249][web:251][web:257]
        </p>
      </div>
    </section>

    <section>
      <h2>Autres leviers simples : rotations, haies, préparations</h2>
      <p>
        Pour compléter, plusieurs ressources proposent d’alterner les cultures, d’installer des haies ou arbres, et d’utiliser des préparations comme thé de compost ou purins.[web:248][web:250][web:252][web:254][web:257]
      </p>

      <h3>Alterner les cultures</h3>
      <p>
        Ne pas cultiver toujours la même famille de plantes au même endroit permet d’équilibrer les besoins et de limiter l’épuisement du sol.[web:250][web:254][web:257]
      </p>

      <h3>Haies, arbres & couvert végétal</h3>
      <p>
        Planter des haies champêtres, laisser des zones couvertes et éviter de laisser la terre nue toute l’année aide à stabiliser et enrichir progressivement le sol.[web:248][web:251][web:254]
      </p>

      <h3>Préparations naturelles</h3>
      <p>
        Thé de compost, purins d’ortie, de consoude ou de prêle sont cités comme des moyens de stimuler l’activité biologique et d’apporter des nutriments facilement assimilables.[web:248][web:252][web:254][web:257]
      </p>
    </section>

    <section>
      <h2>Avancer doucement avec ton sol</h2>
      <p>
        Les retours d’expérience montrent qu’un sol épuisé ne se transforme pas en un an, mais qu’avec des gestes réguliers, on voit déjà des changements après quelques saisons.[web:248][web:252][web:257]
      </p>
      <p>
        En choisissant un rythme réaliste pour toi (une zone à la fois, un engrais vert par saison, un peu plus de paillage), tu fais de ton sol un vrai compagnon de jardin, pas un obstacle.[web:248][web:254][web:257]
      </p>

      <div class="box">
        <div class="box-title">Petit plan simple</div>
        <p>
          Cette année, choisis une seule parcelle “test” : ajoute-y du compost, sème un engrais vert après la culture principale, et couvre le sol le plus souvent possible. Observe comment la terre se transforme au fil des mois.[web:248][web:252][web:257]
        </p>
      </div>
