    <h1>Mildiou : protéger le potager sans tout arracher</h1>
    <p class="hero-sub">
      Le mildiou est la maladie qui fait le plus peur au potager, surtout sur les tomates et les pommes de terre. Entre prévention, observation et quelques traitements naturels, tu peux réduire son impact sans perdre tout plaisir à jardiner.
    </p>
  </header>

  <main>
    <section>
      <h2>Reconnaître les premiers signes</h2>
      <p>
        Le mildiou est une maladie fongique qui provoque des taches vert foncé à brun sur les feuilles, souvent en bordure, avant qu’elles ne jaunissent et ne se dessèchent.[web:84][web:87][web:90][web:93]
      </p>
      <p>
        Il apprécie particulièrement les périodes humides et douces, et touche surtout les tomates, pommes de terre et autres plantes du même groupe.[web:84][web:87][web:90]
      </p>

      <div class="box">
        <div class="box-title">Quelques signes typiques</div>
        <u
        <ul>
          >Petites taches vert foncé à brun sur les feuilles, qui s’étendent rapidement.[web:84][web:87][web:90][web:93]</li>
          >Feuilles qui se dessèchent, plants qui semblent s’effondrer en quelques jours par temps humide.[web:84][web:87]</li>
          >Taches brunes sur les fruits (tomates) ou sur les tubercules (pommes de terre) en cas d’attaque sévère.[web:84][web:87][web:90]
          </li>
        </ul>
      </div>
    </section>

    <section>
      <h2>Geste n°1 : la prévention au quotidien</h2>
      <p>
        Les sources de jardinage insistent sur le fait qu’il n’existe pas de solution miracle curative, et que le plus efficace reste une bonne prévention.[web:84][web:87][web:90][web:93]
      </p>

      <h3>Espacer et aérer les plants</h3>
      <p>
        De nombreux guides recommandent de bien espacer les plants, d’aérer le feuillage (taille des feuilles basses, suppression des gourmands) et de favoriser la circulation de l’air pour que l’humidité ne stagne pas.[web:84][web:85][web:87][web:90][web:91]
      </p>

      <h3>Arroser au pied, le matin</h3>
      <p>
        Arroser les tomates et autres plantes sensibles au pied plutôt que sur le feuillage, de préférence le matin, revient dans la plupart des conseils pour limiter le développement du mildiou.[web:84][web:87][web:90][web:93]
      </p>

      <h3>Choisir variétés et emplacement</h3>
      <p>
        Certaines variétés de tomates sont décrites comme plus tolérantes au mildiou, et plusieurs sources recommandent aussi de ne pas planter tomates et pommes de terre côte à côte.[web:87][web:90][web:93]
      </p>

      <div class="box">
        <div class="box-title">Un sol vivant comme allié</div>
        <p>
          Les purins d’ortie, de prêle ou de consoude sont souvent conseillés pour stimuler les défenses naturelles des plantes et renforcer leur résistance aux maladies.[web:85][web:87][web:90][web:93]
        </p>
      </div>
    </section>

    <section>
      <h2>Bicarbonate, lait et purins : traitements naturels souvent cités</h2>
      <p>
        Plusieurs traitements doux reviennent régulièrement dans les conseils de lutte contre le mildiou : bicarbonate de soude, purins végétaux, lait dilué, parfois en complément de pratiques classiques.[web:84][web:86][web:87][web:90][web:93]
      </p>

      <h3>Solution au bicarbonate de soude</h3>
      <p>
        De nombreux jardiniers proposent de diluer environ 1 cuillère à café (5 à 10 g) de bicarbonate de soude par litre d’eau, avec une petite quantité de savon noir comme agent mouillant.[web:84][web:86][web:89][web:90][web:93]
      </p>

      <div class="box">
        <div class="box-title">Exemple de dosage mentionné</div>
        <u
        <ul>
          >1 cuillère à café de bicarbonate de soude pour 1 litre d’eau.[web:84][web:86][web:90][web:93]</li>
          >Ajouter 1 cuillère à café de savon noir liquide ou un peu de savon doux pour aider la solution à adhérer.[web:84][web:86][web:90][web:93]</li>
          >Pulvériser sur l’ensemble du feuillage en prévention ou au tout début de l’attaque, sans dépasser environ 10 g/L pour éviter de brûler les feuilles.[web:84][web:86][web:89][web:93]</li>
        </ul>
      </div>

      <h3>Lait dilué</h3>
      <p>
        Le lait dilué (souvent 1 volume de lait pour 9 volumes d’eau) est présenté comme un fongicide doux à pulvériser régulièrement sur les feuilles, qui peut aussi aider contre le mildiou.[web:90][web:93]
      </p>

      <h3>Purins d’ortie, de prêle, de consoude</h3>
      <p>
        Les purins (surtout prêle et ortie, parfois consoude en complément) sont souvent recommandés en prévention, à pulvériser sur les feuilles ou à arroser au pied pour renforcer la plante et limiter l’installation du champignon.[web:85][web:87][web:90][web:91][web:93]
      </p>
    </section>

    <section>
      <h2>Que faire en cas d’attaque déjà installée ?</h2>
      <p>
        Si le mildiou est bien visible, les conseils convergent vers la suppression rapide des feuilles et parties les plus atteintes, en évitant de les laisser au sol ou dans le compost.[web:84][web:87][web:90][web:93]
      </p>
      <p>
        Dans certains cas, il est recommandé d’arracher complètement les plants les plus touchés pour protéger les autres, surtout lorsque la météo reste très favorable au mildiou.[web:84][web:87][web:90][web:93]
      </p>

      <div class="box">
        <div class="box-title">Préserver ce qui peut l’être</div>
        <p>
          Plusieurs guides conseillent de récolter les fruits encore sains dès que possible, de nettoyer les tuteurs et de renouveler certaines pratiques de culture l’année suivante (rotation, variétés, emplacement).[web:87][web:90][web:93]
        </p>
      </div>
    </section>

    <section>
      <div class="box">
        <div class="box-title">3 gestes express quand la météo devient humide</div>
        <u
        <ul>
          >Faire un tour rapide des tomates et pommes de terre, retirer les feuilles les plus basses qui touchent le sol et celles qui paraissent douteuses.[web:84][web:87]</li>
          >Préparer une pulvérisation douce (bicarbonate + un peu de savon noir, ou purin de prêle/ortie dilué) à passer en prévention sur les plants les plus sensibles.[web:84][web:85][web:87][web:90][web:93]</li>
          >Arroser seulement au pied, le matin, et laisser bien respirer le feuillage en évitant les arrosages en fin de journée.[web:84][web:87][web:90][web:93]</li>
        </ul>
      </div>
    </section>

      </p>

    <section>
      <h2>Garder confiance dans ton potager</h2>
      <p>
        Même si le mildiou peut décourager, les retours d’expérience montrent qu’on peut apprendre, ajuster ses pratiques et limiter les dégâts saison après saison.[web:84][web:87][web:90]
      </p>
      <p>
        Avec quelques réflexes simples, des traitements naturels et une dose de patience, ton potager reste un lieu d’apprentissage et de plaisir, pas un terrain d’angoisse permanente.
      </p>

      <div class="box">
        <div class="box-title">Petit rituel de saison</div>
        <p>
          Quand la météo annonce plusieurs jours humides et doux, fais un tour de tes tomates : un peu d’aération, un arrosage bien placé, un passage de purin ou de bicarbonate si besoin… et une respiration pour toi aussi.[web:84][web:85][web:87][web:90][web:93]
        </p>
